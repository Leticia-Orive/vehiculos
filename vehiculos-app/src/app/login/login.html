<div class="login-container">
  <div class="login-card">
    <h1>Gestión de Vehículos</h1>
    <p class="login-subtitulo">Ingresa tus credenciales</p>

    <!-- Mostrar error si existe -->
    @if (errorMensaje) {
      <div class="error-mensaje">{{ errorMensaje }}</div>
    }

    <form (ngSubmit)="onLogin()">
      <!-- Campo Usuario -->
      <div class="form-grupo">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Ej: admin"
          [disabled]="cargando"
          autofocus
        />
      </div>

      <!-- Campo Contraseña -->
      <div class="form-grupo">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          [disabled]="cargando"
        />
      </div>

      <!-- Botón de Login -->
      <button type="submit" class="btn-login" [disabled]="cargando">
        @if (cargando) {
          Cargando...
        } @else {
          Ingresar
        }
      </button>
    </form>

    <!-- Sugerencias de demo -->
    <div class="demo-sugerencias">
      <p>Credenciales de prueba:</p>
      <button type="button" (click)="cargarDemoAdmin()" class="btn-demo">
        Admin
      </button>
      <button type="button" (click)="cargarDemoUser()" class="btn-demo">
        Usuario
      </button>
    </div>
  </div>
</div>
