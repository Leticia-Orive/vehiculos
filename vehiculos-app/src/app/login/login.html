<div class="login-container">
  <div class="login-card">
    <h1>Gestión de Vehículos</h1>
    <p class="login-subtitulo">Ingresa tus credenciales</p>

    <!-- Mostrar error si existe -->
    @if (errorMensaje) {
      <div class="error-mensaje">{{ errorMensaje }}</div>
    }

    <form (ngSubmit)="onLogin()">
      <!-- Campo Usuario -->
      <div class="form-grupo">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Ej: admin"
          autocomplete="username"
          required
          [disabled]="cargando"
          autofocus
        />
      </div>

      <!-- Campo Contraseña -->
      <div class="form-grupo">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
            required
            [disabled]="cargando"
          />
          <button
            type="button"
            class="btn-toggle-password"
            (click)="togglePassword()"
            [title]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            {{ mostrarPassword ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <!-- Botón de Login -->
      <button type="submit" class="btn-login" [disabled]="cargando">
        @if (cargando) {
          Cargando...
        } @else {
          Ingresar
        }
      </button>
    </form>

    <!-- Recuérdame -->
    <div class="form-grupo-checkbox">
      <label>
        <input type="checkbox" [(ngModel)]="recordarme" name="recordarme" [disabled]="cargando" />
        Recuérdame en este dispositivo
      </label>
    </div>

    <!-- Sugerencias de demo -->
    <div class="demo-sugerencias">
      <p>Credenciales de prueba:</p>
      <button type="button" (click)="cargarDemoAdmin()" class="btn-demo">Admin</button>
      <button type="button" (click)="cargarDemoUser()" class="btn-demo">Usuario</button>
    </div>

    <!-- Link al registro -->
    <div class="link-alternativo">¿No tienes cuenta? <a routerLink="/register">Regístrate</a></div>
  </div>
</div>
